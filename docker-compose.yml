networks:
  jcb-net:
    driver: bridge

volumes:
  mongo-data:
  emqx-data:

services:
  # ===== MQTT Broker =====
  emqx:
    image: emqx/emqx:5.3.0
    container_name: jcb-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE_NAME: emqx@jcb-emqx
      EMQX_LISTENERS__MQTT__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "0.0.0.0:18083"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx-data:/opt/emqx/data
    networks:
      - jcb-net
    healthcheck:
      test: ["CMD", "emqx_ctl", "status"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===== Veritabani =====
  mongo:
    image: mongo:7.0
    container_name: jcb-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jcb-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 3

  # ===== Node.js Sunucu =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jcb-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/jcb_tracker
      MQTT_BROKER: mqtt://emqx:1883
      MQTT_WS_BROKER: ws://emqx:8083
      JWT_SECRET: ${JWT_SECRET:-jcb_tracker_default_secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jcbtracker.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./server/exports:/app/exports
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - jcb-net
