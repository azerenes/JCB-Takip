networks:
  jcb-net:
    driver: bridge

volumes:
  mongo-data:
  emqx-data:
  simulator-state:
  caddy-data:

services:
  # ===== MQTT Broker =====
  emqx:
    image: emqx/emqx:5.3.0
    container_name: jcb-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE_NAME: emqx@jcb-emqx
      EMQX_LISTENERS__MQTT__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "0.0.0.0:18083"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx-data:/opt/emqx/data
    networks:
      - jcb-net
    healthcheck:
      test: ["CMD", "emqx_ctl", "status"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===== Veritabani =====
  mongo:
    image: mongo:7.0
    container_name: jcb-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jcb-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 3

  # ===== Node.js Sunucu =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jcb-server
    restart: unless-stopped
    expose:
      - "3000"                    # Caddy üzerinden erişilir (direkt erişim için "ports: ['3000:3000']" ekleyin)

    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/jcb_tracker
      MQTT_BROKER: mqtt://emqx:1883
      MQTT_WS_BROKER: ws://emqx:8083
      JWT_SECRET: ${JWT_SECRET:-degistirin_bu_sifreyi}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jcbtracker.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      REQUIRE_SETUP: ${REQUIRE_SETUP:-true}
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      TZ: ${TZ:-Europe/Istanbul}
    volumes:
      - ./server/exports:/app/exports
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - jcb-net

  # ===== Cihaz Simulator =====
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: jcb-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER: mqtt://emqx:1883
      API_URL: http://server:3000
      DEVICE_COUNT: ${SIM_DEVICE_COUNT:-12}
      INTERVAL_MS: ${SIM_INTERVAL_MS:-10000}
      AUTH_TOKEN: ""
      TENANT_ID: ""
    depends_on:
      emqx:
        condition: service_started
      server:
        condition: service_started
    networks:
      - jcb-net

  # ===== Caddy Reverse Proxy (SSL) =====
  caddy:
    image: caddy:2-alpine
    container_name: jcb-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_EMAIL: ${CADDY_EMAIL:-admin@jcbtracker.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    depends_on:
      - server
    networks:
      - jcb-net
