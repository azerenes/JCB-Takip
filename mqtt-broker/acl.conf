# JCB Tracker - MQTT ACL Kurallari
# Format: allow|deny <publish|subscribe|all> <topic> [username]

# Cihazlar kendi topic'lerine erisebilir
allow publish jcb/%u/live
allow publish jcb/%u/status
allow subscribe jcb/%u/cmd
allow subscribe jcb/%u/config

# Admin panel tum cihazlari izleyebilir
allow subscribe jcb/+/live
allow subscribe jcb/+/status
allow publish jcb/+/cmd

# Dashboard kullanici
allow subscribe jcb/+/live
allow subscribe jcb/+/status

# Herkese acik topic yok
deny all
