version: '3.8'

services:
  emqx:
    image: emqx/emqx:5.3.0
    container_name: jcb-emqx
    restart: unless-stopped
    environment:
      - EMQX_NODE_NAME=emqx@jcb-emqx
      - EMQX_LISTENERS__MQTT__DEFAULT__BIND="0.0.0.0:1883"
      - EMQX_LISTENERS__WS__DEFAULT__BIND="0.0.0.0:8083"
      - EMQX_DASHBOARD__LISTENERS__HTTP__BIND="0.0.0.0:18083"
      - EMQX_AUTHENTICATION__1__BACKEND=built_in_database
      - EMQX_AUTHORIZATION__SOURCES__1__TYPE=built_in_database
    ports:
      - "1883:1883"   # MQTT
      - "8083:8083"   # WebSocket
      - "18083:18083" # Dashboard
    volumes:
      - ./emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./acl.conf:/opt/emqx/etc/acl.conf:ro
      - emqx-data:/opt/emqx/data
    networks:
      - jcb-net

networks:
  jcb-net:
    driver: bridge

volumes:
  emqx-data:
