# JCB Tracker - EMQX Broker Konfigurasyonu

node {
    name = "emqx@jcb-emqx"
    cookie = "jcb-cluster-cookie"
}

log {
    level = info
    console_handler {
        enable = true
        level = info
    }
}

listeners.tcp.default {
    bind = "0.0.0.0:1883"
    max_connections = 1024
}

listeners.ws.default {
    bind = "0.0.0.0:8083"
    max_connections = 512
}

authentication {
    enable = true
    backend = "built_in_database"
    mechanisms = ["password_based"]
}

authorization {
    no_match = "deny"
    sources = [
        {
            type = "built_in_database"
            enable = true
        }
    ]
}

mqtt {
    max_packet_size = "1MB"
    session_expiry_interval = "2h"
    keepalive = 60
    max_clientid_length = 64
}

retainer {
    enable = true
    max_retained_messages = 1000
}
