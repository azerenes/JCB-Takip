<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giris - JCB Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.login-box { background:#1e293b; border-radius:24px; padding:48px; max-width:420px; width:100%; box-shadow:0 25px 50px rgba(0,0,0,0.5); border:1px solid #334155; }
.logo { width:64px; height:64px; background:#3b82f6; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:28px; color:#fff; }
h1 { text-align:center; color:#f1f5f9; font-size:24px; font-weight:700; margin-bottom:4px; }
.subtitle { text-align:center; color:#94a3b8; font-size:14px; margin-bottom:32px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; color:#cbd5e1; font-size:14px; font-weight:500; margin-bottom:6px; }
.form-group input { width:100%; padding:14px 16px; background:#0f172a; border:1px solid #334155; border-radius:12px; color:#f1f5f9; font-size:15px; outline:none; transition:border-color 0.2s; }
.form-group input:focus { border-color:#3b82f6; }
.btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; background:#3b82f6; color:#fff; }
.btn:hover { background:#2563eb; transform:translateY(-1px); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.error { background:#7f1d1d; color:#fca5a5; padding:12px 16px; border-radius:12px; font-size:14px; margin-bottom:16px; display:none; border:1px solid #991b1b; }
.footer { text-align:center; margin-top:24px; color:#64748b; font-size:13px; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid #334155; border-top-color:#3b82f6; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="login-box">
    <div class="logo">&#x1f4f1;</div>
    <h1>JCB Tracker</h1>
    <p class="subtitle">Is Makineleri Takip Sistemi</p>
    <div class="error" id="errorMsg"></div>
    <div class="form-group"><label>E-posta</label><input type="email" id="email" placeholder="ornek@firma.com" autofocus></div>
    <div class="form-group"><label>Sifre</label><input type="password" id="password" placeholder="Sifreniz" onkeydown="if(event.key==='Enter') login()"></div>
    <button class="btn" id="loginBtn" onclick="login()">Giris Yap</button>
    <div class="footer"><a href="/" style="color:#3b82f6;text-decoration:none;">Ana Sayfa</a></div>
</div>

<script>
async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Email ve sifre gerekli'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Giris yapiliyor...';

    try {
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email, password }) });
        const data = await res.json();
        if (data.token) {
            localStorage.setItem('token', data.token);
            window.location.href = '/index.html';
        } else {
            showError(data.error || 'Giris basarisiz');
            btn.disabled = false; btn.innerHTML = 'Giris Yap';
        }
    } catch(e) {
        showError('Sunucu baglanti hatasi');
        btn.disabled = false; btn.innerHTML = 'Giris Yap';
    }
}

function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }

// Redirect if already logged in
if (localStorage.getItem('token')) { window.location.href = '/index.html'; }
</script>
</body>
</html>
