<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCB Tracker - Canlı Harita</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🚜 JCB Tracker</div>
        <div class="nav-links">
            <a href="index.html" class="active">Harita</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="reports.html">Raporlar</a>
            <a href="#" id="logoutBtn">Çıkış</a>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar" id="deviceList">
            <div class="sidebar-header">
                <h3>Cihazlar</h3>
                <div class="filter-group">
                    <select id="groupFilter">
                        <option value="">Tüm Gruplar</option>
                    </select>
                    <input type="text" id="searchDevice" placeholder="Ara..." />
                </div>
            </div>
            <div class="device-items" id="deviceItems"></div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
        </main>

        <aside class="info-panel" id="infoPanel">
            <div class="info-header">
                <h3 id="infoTitle">Cihaz Detayı</h3>
                <button onclick="closeInfo()">×</button>
            </div>
            <div id="infoContent" class="info-content">
                <p>Haritada bir cihaz seçin</p>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
