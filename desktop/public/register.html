<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCB Tracker - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .register-card { background: var(--card); border-radius: 20px; padding: 48px; width: 480px; max-width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .register-card h1 { font-size: 28px; margin-bottom: 4px; }
        .register-card .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
        .register-card .form-group { margin-bottom: 20px; }
        .register-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .register-card input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; transition: border-color 0.2s; }
        .register-card input:focus { outline: none; border-color: var(--primary); }
        .register-card .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .register-card .btn-primary:hover { background: var(--primary-dark); }
        .register-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .register-card .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
        .register-card .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .register-card .error-msg { background: #fee2e2; color: var(--danger); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: none; }
        .register-card .success-msg { background: #dcfce7; color: var(--success); padding: 16px; border-radius: 8px; font-size: 14px; display: none; text-align: center; }
        .register-card .success-msg strong { display: block; font-size: 20px; margin-bottom: 8px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="register-body">
    <div class="register-card">
        <h1>JCB Tracker'a Katılın</h1>
        <p class="subtitle">Size özel bir hesap oluşturalım</p>
        <div id="registerError" class="error-msg"></div>
        <div id="registerSuccess" class="success-msg"></div>

        <div id="registerForm">
            <div class="form-group">
                <label>Firma Adı</label>
                <input type="text" id="regCompany" placeholder="Firma adınız" />
            </div>
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="regEmail" placeholder="E-posta adresiniz" />
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="regPassword" placeholder="En az 6 karakter" />
            </div>

            <button onclick="register()" class="btn-primary" id="regBtn">Kayıt Ol</button>
            <div class="login-link">
                Zaten hesabınız var mı? <a href="/app.html">Giriş Yap</a>
            </div>
        </div>
    </div>

    <script>
        async function register() {
            const company = document.getElementById('regCompany').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const errDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const formDiv = document.getElementById('registerForm');
            const btn = document.getElementById('regBtn');

            errDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!company || !email || !password) {
                errDiv.textContent = 'Lütfen tüm alanları doldurun';
                errDiv.style.display = 'block'; return;
            }
            if (password.length < 6) {
                errDiv.textContent = 'Şifre en az 6 karakter olmalıdır';
                errDiv.style.display = 'block'; return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Kaydediliyor...';

            try {
                const res = await fetch('/api/tenant/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ companyName: company, contactEmail: email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errDiv.textContent = data.error || 'Kayıt sırasında hata oluştu';
                    errDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Kayıt Ol';
                    return;
                }

                formDiv.style.display = 'none';
                successDiv.style.display = 'block';
                successDiv.innerHTML = '<strong>Hesabınız Oluşturuldu</strong>' +
                    '<p style="margin:12px 0">Size özel hesabınız hazır. Giriş yaparak hemen başlayabilirsiniz.</p>' +
                    '<a href="/app.html" style="display:inline-block;padding:12px 32px;background:var(--primary);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;margin-top:8px">Giriş Yap</a>';
            } catch (err) {
                errDiv.textContent = 'Sunucuya bağlanılamadı';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Kayıt Ol';
            }
        }
    </script>
</body>
</html>
